services:
  backend:
    build: .
    command: uvicorn backend.main:app --host 0.0.0.0 --port 8000
    env_file:
      - path: .env
        required: false
    ports:
      - "8000:8000"

  frontend:
    build: .
    command: streamlit run app.py --server.address=0.0.0.0 --server.port=8501
    depends_on:
      - backend
    env_file:
      - path: .env
        required: false
    environment:
      BACKEND_URL: http://backend:8000
    ports:
      - "8501:8501"
